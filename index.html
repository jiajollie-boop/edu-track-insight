<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育二级赛道洞察</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  /* 主色系统 - 柔雾粉系列 */
  --color-primary: #F4A4B4;
  --color-primary-light: #F8C3CD;
  --color-primary-soft: #FDF2F4;
  --color-primary-dark: #E8919C;
  --color-primary-hover: #E0808D;
  
  /* 辅助色 - 柔和 pastel */
  --color-mint: #A8E6CF;
  --color-mint-light: #E8FAF2;
  --color-mint-dark: #7AC9A8;
  --color-sky: #B4D7F0;
  --color-sky-light: #EDF6FC;
  --color-sky-dark: #8AB8D9;
  --color-lavender: #D4C5F9;
  --color-lavender-light: #F5F2FD;
  --color-lavender-dark: #B8A5E0;
  --color-cream: #FFEAA7;
  --color-cream-light: #FFF9E6;
  --color-cream-dark: #E6D28A;
  --color-coral: #FFB7B2;
  --color-coral-light: #FFF0EF;
  --color-coral-dark: #E69A95;
  
  /* 赛道识别色 */
  --track-junior: #F4A4B4;
  --track-junior-bg: #FDF2F4;
  --track-junior-dark: #C97A8A;
  --track-vocational: #A8E6CF;
  --track-vocational-bg: #F0FDF7;
  --track-vocational-dark: #7AC9A8;
  --track-interest: #B4D7F0;
  --track-interest-bg: #F0F7FD;
  --track-interest-dark: #8AB8D9;
  --track-degree: #D4C5F9;
  --track-degree-bg: #F7F4FD;
  --track-degree-dark: #B8A5E0;
  --track-language: #FFEAA7;
  --track-language-bg: #FFF9E6;
  --track-language-dark: #E6D28A;
  
  /* 中性色 - 暖色调 */
  --bg: #FDF8F5;
  --bg-secondary: #F8F0EC;
  --card: #FFFFFF;
  --card-elevated: #FAF7F5;
  --text-primary: #111111;
  --text-secondary: #555555;
  --text-tertiary: #999999;
  --text-muted: #BBBBBB;
  --text-placeholder: #D5D5D5;
  --border: #E8E3DE;
  --border-light: #F0EBE6;
  --border-bold: #D8D4D0;
  
  /* 语义色 */
  --success: #A8E6CF;
  --success-light: #E8FAF2;
  --success-dark: #7AC9A8;
  --warning: #FFEAA7;
  --warning-light: #FFF9E6;
  --warning-dark: #E6D28A;
  --error: #E8919C;
  --error-light: #FDF2F4;
  --error-dark: #C97A8A;
  --info: #B4D7F0;
  --info-light: #EDF6FC;
  --info-dark: #8AB8D9;
  
  /* 侧边栏 - 柔和深色 */
  --sidebar-bg: #2D2A26;
  --sidebar-hover: rgba(244, 164, 180, 0.1);
  --sidebar-active: rgba(244, 164, 180, 0.2);
  
  /* 阴影 - 暖色调 */
  --shadow-sm: 0 2px 8px rgba(45, 42, 38, 0.04);
  --shadow-md: 0 4px 16px rgba(45, 42, 38, 0.08);
  --shadow-lg: 0 8px 32px rgba(244, 164, 180, 0.12);
  --shadow-hover: 0 12px 40px rgba(45, 42, 38, 0.12);
  --shadow-drawer: -8px 0 40px rgba(45, 42, 38, 0.15);
  --shadow-glow: 0 0 20px rgba(244, 164, 180, 0.3);
  
  /* 圆角 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;
  
  /* 字体 */
  --font-display: 'Outfit', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font: 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', monospace;
  
  /* 动画 */
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;
  --transition-slow: 500ms ease;
  
  /* 保留兼容（旧代码中用 --red 等变量） */
  --red: var(--color-primary);
  --red-light: var(--color-primary-soft);
  --red-soft: var(--color-primary-light);
  --red-hover: var(--color-primary-hover);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.animate-fadeIn { animation: fadeIn var(--transition-normal) var(--ease-out) forwards; }
.animate-fadeInUp { animation: fadeInUp var(--transition-normal) var(--ease-out) forwards; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  letter-spacing: -0.01em;
}

/* ========= 侧边栏 — Apple 深色毛玻璃风格 ========= */
.sidebar {
  position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column; z-index: 200;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo .logo-text {
  font-size: 15px; font-weight: 700; color: #F5F5F7;
  display: flex; align-items: center; gap: 10px;
  letter-spacing: -0.02em;
}
.sidebar-logo .logo-sub {
  font-size: 11px; color: rgba(255,255,255,0.35);
  margin-top: 6px; letter-spacing: 0;
}
.sidebar-logo .logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px rgba(244, 164, 180, 0.5);
}
.nav-section { padding: 12px 0; flex: 1; overflow-y: auto; }
.nav-label {
  font-size: 10px; color: rgba(255,255,255,0.28);
  font-weight: 600; letter-spacing: 0.06em;
  padding: 8px 20px 6px; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; margin: 1px 8px;
  color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s var(--ease);
  border-radius: var(--radius-sm); user-select: none;
  border-left: none;
}
.nav-item:hover {
  color: rgba(255,255,255,0.85);
  background: var(--sidebar-hover);
}
.nav-item.active {
  color: #F5F5F7;
  background: var(--sidebar-active);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px; border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
  box-shadow: 0 0 8px rgba(244, 164, 180, 0.5);
}
.nav-item { position: relative; }
.nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; color: rgba(255,255,255,0.2);
}

/* ========= 顶部栏 — Apple 毛玻璃 ========= */
.topbar {
  position: fixed; top: 0; left: 240px; right: 0; height: 52px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title {
  font-size: 16px; font-weight: 700; color: var(--text-primary);
  letter-spacing: -0.02em;
}
.topbar-badge {
  font-size: 10px; font-weight: 600;
  background: var(--red-light); color: var(--red);
  padding: 3px 8px; border-radius: 6px;
  letter-spacing: 0.02em;
}
.topbar-right {
  display: flex; align-items: center; gap: 14px;
  font-size: 12px; color: var(--text-muted);
}
.btn-refresh {
  padding: 6px 14px;
  border: 1px solid var(--border-bold); border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.6); font-size: 12px;
  cursor: pointer; color: var(--text-tertiary);
  transition: all 0.2s var(--ease); font-family: var(--font);
  backdrop-filter: blur(8px);
}
.btn-refresh:hover {
  background: rgba(255,255,255,0.9);
  border-color: var(--red);
  color: var(--red);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

/* ========= 主内容区 ========= */
.main-content {
  margin-left: 240px; padding: 68px 32px 48px;
  min-height: 100vh;
  max-width: calc(100vw - 240px);
}
.module-content { display: none; animation: fadeIn 0.3s var(--ease); }
.module-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ========= 卡片 — 柔雾粉精致风格 ========= */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 0.5px solid var(--border);
  padding: 22px 24px; margin-bottom: 14px;
  transition: all 0.3s var(--ease-out);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(244, 164, 180, 0.03) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s var(--ease);
  pointer-events: none;
}
.card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}
.card:hover::before {
  opacity: 1;
}
.card-title {
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 18px; letter-spacing: -0.02em;
}

/* ========= 标签 ========= */
.tag {
  background: var(--bg); color: var(--text-tertiary);
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 6px; white-space: nowrap;
  letter-spacing: 0.01em;
}
.date-text { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

/* ========= Tab 组件 — 柔雾粉分段控制器风格 ========= */
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border-bold);
  margin-bottom: 22px; gap: 0;
}
.tab-btn {
  padding: 12px 24px; border: none; background: transparent;
  cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--text-tertiary);
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.25s var(--ease-out); font-family: var(--font);
  letter-spacing: -0.01em;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  position: relative;
}
.tab-btn::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 50%;
  width: 0; height: 3px;
  background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
  transition: all 0.3s var(--spring);
  transform: translateX(-50%);
  border-radius: 3px 3px 0 0;
}
.tab-btn:hover { 
  color: var(--text-secondary); 
  background: rgba(244, 164, 180, 0.05);
}
.tab-btn.active {
  color: var(--color-primary-dark);
  font-weight: 600;
}
.tab-btn.active::after {
  width: 80%;
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.25s var(--ease); }
/* ========= 模块3：赛道折叠卡 ========= */
.track-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s var(--ease);
}
.track-card:hover { box-shadow: var(--shadow-md); }
.track-card-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  transition: background 0.15s;
  user-select: none;
}
.track-card-header:hover { background: #FAFAFA; }
.track-card-left {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  flex-wrap: wrap;
  min-width: 0;
}
.track-card-name {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.track-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.track-card-metrics {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-tertiary);
  flex-wrap: wrap;
  align-items: center;
}
.track-card-metrics .tm { display: flex; align-items: center; gap: 4px; }
.track-card-metrics .tm b { color: var(--text-primary); font-weight: 600; }
.track-card-metrics .up { color: #16A34A; font-weight: 600; }
.track-card-metrics .down { color: #EF4444; font-weight: 600; }
.track-card-metrics .neutral { color: #9CA3AF; }
.track-card-mini-chart {
  width: 80px;
  height: 32px;
  display: flex;
  align-items: flex-end;
  gap: 1px;
  flex-shrink: 0;
}
.track-card-mini-chart .mb {
  flex: 1;
  background: var(--red);
  border-radius: 1px 1px 0 0;
  opacity: 0.5;
  min-width: 2px;
  transition: opacity 0.2s;
}
.track-card:hover .track-card-mini-chart .mb { opacity: 0.7; }
.track-card-toggle {
  font-size: 12px;
  color: var(--red);
  font-weight: 500;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.track-card-toggle .arrow {
  transition: transform 0.3s var(--spring);
  font-size: 10px;
}
.track-card.expanded .track-card-toggle .arrow { transform: rotate(180deg); }
.track-card-detail {
  display: none;
  border-top: 1px solid var(--border);
}
.track-card.expanded .track-card-detail { display: block; }
.track-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  padding: 20px;
}
.track-detail-grid .track-bm-full {
  grid-column: 1 / -1;
}
.bm-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.bm-table th { text-align: center; font-weight: 500; color: #9CA3AF; padding: 8px 10px; font-size: 11px; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }
.bm-table th:first-child { text-align: left; }
.bm-table td { padding: 10px 10px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text-primary); }
.bm-table td:first-child { text-align: left; }
.bm-table td .bm-label { display: inline-block; }
.bm-tip { margin-top: 12px; padding: 10px 14px; background: rgba(244,164,180,0.06); border-radius: var(--radius-md); font-size: 12px; color: var(--text-secondary); line-height: 1.6; display: flex; align-items: flex-start; gap: 6px; }
.bm-tip-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
@media (max-width: 1100px) { .track-detail-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .track-detail-grid { grid-template-columns: 1fr; } }
.track-detail-section {
  background: #FAFAFA;
  border-radius: var(--radius-md);
  padding: 16px;
}
.track-detail-section h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.track-metric-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.track-metric-row:last-child { border-bottom: none; }
.track-metric-row .lbl { color: var(--text-tertiary); }
.track-metric-row .val { font-weight: 600; color: var(--text-primary); }
.track-client-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.track-client-table th {
  text-align: left; font-weight: 500; color: #9CA3AF;
  padding: 6px 8px; font-size: 11px; letter-spacing: 0.3px;
}
.track-client-table td { padding: 7px 8px; border-top: 1px solid var(--border); }
.track-client-table .rank { font-weight: 700; color: var(--red); width: 24px; }
.track-client-table .cname { font-weight: 600; }
.track-client-table .spend { font-family: var(--font-mono); font-size: 12px; }
.bm-label { font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
.bm-head { background: #FEE2E2; color: #EF4444; }
.bm-mid { background: #FEF3C7; color: #D97706; }
.bm-tail { background: #DBEAFE; color: #2563EB; }
.track-no-data {
  color: #D1D5DB; font-size: 12px; font-style: italic;
  text-align: center; padding: 20px;
}
.track-action-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.track-action-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-bold);
  background: var(--card);
  color: var(--text-secondary);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.track-action-btn:hover { border-color: var(--red); color: var(--red); }
.track-chart-container { width: 100%; height: 180px; }

/* ========= 模块3B：赛道投放对标 ========= */
#m3-tab-benchmark .m3b-section-label {
  font-size: 14px; font-weight: 700; color: var(--text-primary);
  margin: 28px 0 12px; display: flex; align-items: center; gap: 8px;
}
#m3-tab-benchmark .m3b-section-label:first-child { margin-top: 0; }
#m3-tab-benchmark .m3b-tag {
  font-size: 11px; background: rgba(244, 164, 180, 0.12); color: var(--red);
  padding: 3px 12px; border-radius: 16px; font-weight: 600;
}
/* Top tabs (趋势/查询) inside benchmark */
.m3b-top-tabs { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0; margin-bottom: 0; }
.m3b-top-tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); border-bottom: 2.5px solid transparent; transition: all 0.2s; }
.m3b-top-tab:hover { color: var(--red); }
.m3b-top-tab.active { color: var(--red); border-bottom-color: var(--red); }
.m3b-top-panel { display: none; }
.m3b-top-panel.active { display: block; padding: 20px 0; }
/* Spend bars */
.m3b-spend-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 13px; }
.m3b-spend-label { width: 36px; text-align: right; color: var(--text-primary); font-weight: 700; }
.m3b-spend-bar-wrap { flex: 1; height: 20px; background: var(--bg); border-radius: 6px; overflow: hidden; }
.m3b-spend-bar { height: 100%; border-radius: 6px; }
.m3b-spend-val { width: 150px; text-align: right; color: var(--text-primary); font-weight: 700; font-size: 12px; }
.m3b-spend-wow { width: 65px; text-align: right; }
.m3b-wow { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
.m3b-wow.up { color: #16A34A; background: rgba(22,163,74,0.08); }
.m3b-wow.down { color: #EF4444; background: rgba(239,68,68,0.08); }
/* Funnel */
.m3b-funnel-wrap { display: flex; gap: 14px; flex-wrap: wrap; }
.m3b-funnel-box { flex: 1; min-width: 200px; background: var(--card); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm); }
.m3b-funnel-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
.m3b-funnel-step { display: flex; align-items: center; gap: 6px; margin: 5px 0; font-size: 12px; }
.m3b-funnel-step-label { width: 68px; text-align: right; color: var(--text-muted); white-space: nowrap; }
.m3b-funnel-bar-wrap { flex: 1; height: 12px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.m3b-funnel-bar { height: 100%; border-radius: 4px; }
.m3b-funnel-val { width: 75px; text-align: right; color: var(--text-primary); font-weight: 700; }
/* Track wind rank */

async function inlineFetch(path) {
  const key = path.replace('./mock-data/', '').replace('.json','');
  if (INLINE_DATA[key]) return { json: () => Promise.resolve(INLINE_DATA[key]) };
  return fetch(path);
}

// ===== 加载模块3（方案C：赛道折叠卡） =====
let m3Charts = [];       // track echarts instances for resize

function scrollToTrack(key) {
  // 更新导航按钮高亮
  const navKeys = ['junior','vocational','interest','degree','language'];
  document.querySelectorAll('.m3-track-nav .tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', navKeys[i] === key);
  });
  // 找到目标卡片，展开并滚动到可视区
  const card = document.querySelector(`.track-card[data-key="${key}"]`);
  if (!card) return;
  if (!card.classList.contains('expanded')) {
    card.classList.add('expanded');
    setTimeout(() => initTrackCharts(key), 50);
  }
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

const DATA_SERVER = 'http://localhost:3000';

async function loadModule3() {
  let source = 'inline';
  try {
    try {
      const serverRes = await fetch(`${DATA_SERVER}/api/track-trends`, { signal: AbortSignal.timeout(15000) });
      if (serverRes.ok) {
        const serverData = await serverRes.json();
        if (serverData && serverData.market && serverData.market.length > 0) {
          m3Data = serverData;
          source = serverData._stale ? 'server(stale)' : 'server(live)';
        }
      }
    } catch (serverErr) {
      console.warn('[M3] server 不可用，降级到内联数据:', serverErr.message);
    }

    if (!m3Data) {
      const res = await inlineFetch('./mock-data/track-trends.json');
      m3Data = await res.json();
    }

    const periodEl = document.getElementById('m3-data-source');
    if (periodEl) {
      const isLive = source.startsWith('server');
      const icon = isLive ? '🟢' : '🟡';
      const freshSets = (m3Data._freshDatasets || []).join('/');
      const staleSets = (m3Data._staleDatasets || []).join('/');
      let detail = `${icon} ${m3Data.period || ''}`;
      if (isLive && freshSets) detail += ` · ${freshSets}`;
      if (!isLive) detail += ' · 离线(内嵌数据)';
      periodEl.textContent = detail;
    }

    if (chartsInited) renderM3();
  } catch(e) {
    document.getElementById('m3-track-cards').innerHTML = `<div style="color:#EF4444;text-align:center;padding:40px">数据加载失败：${e.message}</div>`;
  }
}

function getM3Tracks() {
  if (!m3Data) return [];
  return m3Data.market || [];
}

// ─── 工具函数 ───
function fmtVol(v) { return v >= 10000 ? (v / 10000).toFixed(1) + '万' : v.toLocaleString(); }
function fmtSpend(v) { return v >= 10000000 ? (v / 10000000).toFixed(1) + '千万' : '¥' + (v / 10000).toFixed(0) + '万'; }
function fmtSpendShort(v) { return v >= 10000000 ? (v / 10000000).toFixed(1) + '千万' : (v / 10000).toFixed(0) + '万'; }
function wowCls(w) { return String(w).startsWith('+') ? 'up' : String(w).startsWith('-') ? 'down' : 'neutral'; }
function wowColor(w) { return String(w).startsWith('+') ? '#16A34A' : String(w).startsWith('-') ? '#EF4444' : '#9CA3AF'; }

// ─── 生成迷你柱状图 HTML（折叠头部用，纯CSS） ───
function miniBarHtml(values, color) {
  if (!values || !values.length) return '';
  const max = Math.max(...values);
  if (max <= 0) return '';
  // 只取最后7天
  const recent = values.slice(-7);
  const bars = recent.map(v => {
    const h = Math.max(2, Math.round((v / max) * 30));
    return `<div class="mb" style="height:${h}px;background:${color || 'var(--red)'}"></div>`;
  }).join('');
  return `<div class="track-card-mini-chart">${bars}</div>`;
}

          ${clientSection}

  }).join('');

  setTimeout(() => initTrackCharts(), 80);
}

function toggleTrackCard(headerEl) {
  const card = headerEl.closest('.track-card');
  const wasExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded');
  // 刚展开 → 初始化图表
  if (!wasExpanded) {
    setTimeout(() => initTrackCharts(card.dataset.key), 50);
  }
}

function initTrackCharts(onlyKey) {
  const tracks = getM3Tracks();
  const searchDates = m3Data.searchDates || m3Data.dates || [];
  const contentDates = m3Data.dates || [];

  tracks.forEach(t => {
    if (onlyKey && t.key !== onlyKey) return;
    // 只初始化已展开的卡片
    const card = document.querySelector(`.track-card[data-key="${t.key}"]`);
    if (!card || !card.classList.contains('expanded')) return;

    // ─── 搜索热度图 ───
    const searchEl = document.getElementById('m3-chart-search-' + t.key);
    if (searchEl && !searchEl._echartsInit) {
      const vols = t.search?.volumes || [];
      if (vols.some(v => v > 0)) {
        const chart = echarts.init(searchEl);
        m3Charts.push(chart);
        searchEl._echartsInit = true;
        chart.setOption({
          grid: { top: 10, right: 12, bottom: 24, left: 50 },
          xAxis: { type: 'category', data: searchDates, axisLabel: { fontSize: 10, color: '#9CA3AF' }, axisLine: { lineStyle: { color: '#E5E7EB' } } },
          yAxis: { type: 'value', axisLabel: { formatter: v => (v/10000).toFixed(0) + '万', fontSize: 10, color: '#9CA3AF' }, splitLine: { lineStyle: { color: '#F3F4F6' } } },
          series: [{ type: 'line', data: vols, smooth: true, lineStyle: { color: '#F4A4B4', width: 2 }, areaStyle: { color: 'rgba(244,164,180,0.08)' }, symbol: 'circle', symbolSize: 3, itemStyle: { color: '#F4A4B4' } }],
          tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>搜索量 <b>${(p[0].value/10000).toFixed(1)}万</b>` }
        });
      } else {
        searchEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9CA3AF;font-size:13px">暂无搜索数据</div>';
        searchEl._echartsInit = true;
      }
    }

    // ─── 内容供给图 ───
    const contentEl = document.getElementById('m3-chart-content-' + t.key);
    if (contentEl && !contentEl._echartsInit) {
      const counts = t.content?.noteCount || [];
      if (counts.some(v => v > 0)) {
        const chart = echarts.init(contentEl);
        m3Charts.push(chart);
        contentEl._echartsInit = true;
        chart.setOption({
          grid: { top: 10, right: 12, bottom: 24, left: 50 },
          xAxis: { type: 'category', data: contentDates, axisLabel: { fontSize: 10, color: '#9CA3AF' }, axisLine: { lineStyle: { color: '#E5E7EB' } } },
          yAxis: { type: 'value', axisLabel: { formatter: v => v >= 10000 ? (v/10000).toFixed(0) + '万' : v, fontSize: 10, color: '#9CA3AF' }, splitLine: { lineStyle: { color: '#F3F4F6' } } },
          series: [{ type: 'bar', data: counts, itemStyle: { color: '#2563EB', borderRadius: [3,3,0,0] }, barMaxWidth: 24 }],
          tooltip: { trigger: 'axis', formatter: p => { const v = p[0].value; return `${p[0].axisValue}<br/>发布 ${v >= 10000 ? (v/10000).toFixed(1)+'万' : v} 篇`; } }
        });
      }
    }
  });
}

function initCharts() {
  if (m3Data) renderM3();
}

// ── 趋势/查询Tab切换 ────────────────────────────────
function m3bSwitchTopTab(ck, name) {
  const tabs = ['trends', 'track'];
  const container = document.getElementById('m3b-container');
  if (!container) return;
  container.querySelectorAll('.m3b-top-tab').forEach(function(t, i) {
    if (tabs[i] === name) t.classList.add('active'); else t.classList.remove('active');
  });
  tabs.forEach(function(tb) {
    const p = document.getElementById('m3b-' + ck + '-' + tb);
    if (p) { if (tb === name) p.classList.add('active'); else p.classList.remove('active'); }
  });
}

// ── 链路Tab切换 ─────────────────────────────────────
function m3bSelectLink(ck, key) {
  const container = document.getElementById('m3b-container');
  if (!container) return;
  container.querySelectorAll('.m3b-link-tab').forEach(function(t) {
    if (t.textContent === M3B_LINK_KEYS[key]) t.classList.add('active'); else t.classList.remove('active');
  });
  container.querySelectorAll('.m3b-link-panel').forEach(function(p) { p.classList.remove('active'); });
  const el = document.getElementById('m3b-' + ck + '-link-' + key);
  if (el) el.classList.add('active');
}

// ── 赛道查询 ─────────────────────────────────────────
function m3bOnTrackInput(ck) {
  const input = document.getElementById('m3b-' + ck + '-input');
  const sg = document.getElementById('m3b-' + ck + '-suggest');
  const val = input.value.trim();
  const data = INLINE_DATA['m3b-benchmark'];
  const td = (data && data.trackData && data.trackData[ck]) || {};
  const names = Object.keys(td);
  if (!val) { sg.classList.remove('show'); sg.innerHTML = ''; m3bRenderTrack(ck, ''); return; }
  const matches = names.filter(function(n) { return n.indexOf(val) >= 0; });
  if (matches.length === 1 && matches[0] === val) { sg.classList.remove('show'); m3bRenderTrack(ck, val); return; }
  if (matches.length > 0) {
    sg.innerHTML = matches.map(function(n) {
      return '<div class="m3b-suggest-item" onclick="m3bPickTrack(\'' + ck + '\',\'' + m3bEsc(n) + '\')">' + m3bEsc(n) + '</div>';
    }).join('');
    sg.classList.add('show');
  } else {
    sg.innerHTML = '<div class="m3b-suggest-item">无匹配赛道</div>';
    sg.classList.add('show');
  }
}

function m3bPickTrack(ck, name) {
  document.getElementById('m3b-' + ck + '-input').value = name;
  document.getElementById('m3b-' + ck + '-suggest').classList.remove('show');
  m3bRenderTrack(ck, name);
}

function m3bRenderTrack(ck, name) {
  const area = document.getElementById('m3b-' + ck + '-result');
  const data = INLINE_DATA['m3b-benchmark'];
  const td = (data && data.trackData && data.trackData[ck]) || {};
  if (!name || !td[name]) { if (area) area.innerHTML = ''; return; }
  const d = td[name];
  let h = '';

  // 概览
  h += '<div class="m3b-section-label"><span>📋</span> ' + m3bEsc(name) + ' · 赛道概览</div>';
  let lps = [];
  for (const lk in (d.lp || {})) { lps.push(lk + ' ' + d.lp[lk] + '%'); }
  h += '<div class="m3b-overview-grid">';
  h += '<div class="m3b-overview-card"><div class="ov-label">消耗</div><div class="ov-value">' + m3bFmtMoney(d.spend) + '</div></div>';
  h += '<div class="m3b-overview-card"><div class="ov-label">广告主数</div><div class="ov-value">' + (d.n || '-') + '</div></div>';
  h += '<div class="m3b-overview-card"><div class="ov-label">主力链路</div><div class="ov-value" style="font-size:13px;font-weight:600">' + lps.join('<br>') + '</div></div>';
  h += '</div>';

  // 按链路：漏斗 + Benchmark
  const tierColors = ['#16A34A', '#ca8a04', '#EF4444'];
  const tierLabels = ['🟢 优秀 (P75)', '🟡 中位 (P50)', '🔴 待优化 (P25)'];
  const linkMetaCfg = {
    '私信': [['CTR','%','ctr'],['CPM','元','cpm'],['开口成本','元','开口成本'],['留资成本','元','留资成本']],
    '表单': [['CTR','%','ctr'],['CPM','元','cpm'],['表单成本','元','表单成本']],
    '商销': [['CTR','%','ctr'],['CPM','元','cpm'],['电商CVR','%','cvr']],
    '直播': [['CTR','%','ctr'],['CPM','元','cpm']]
  };

  if (d.links && d.links.length) {
    d.links.forEach(function(link) {
      const lColor = M3B_LINK_COLORS[link] || '#888';
      h += '<div class="m3b-section-label"><span>📊</span> ' + m3bEsc(link) + '链路</div>';
      // Funnel
      const fn = (d.funnels || {})[link];
      if (fn && fn.length) {
        h += '<div class="m3b-funnel-box"><div class="m3b-funnel-title">' + m3bEsc(link) + '链路转化率</div>';
        fn.forEach(function(r, ri) {
          const opacity = (1.0 - ri * 0.2).toFixed(2);
          const barW = fn.length > 1 ? (100 - ri * (70 / (fn.length - 1))).toFixed(1) : 100;
          h += '<div class="m3b-funnel-step"><div class="m3b-funnel-step-label">' + r.label + '</div>';
          h += '<div class="m3b-funnel-bar-wrap"><div class="m3b-funnel-bar" style="width:' + barW + '%;background:' + lColor + ';opacity:' + opacity + '"></div></div>';
          h += '<div class="m3b-funnel-val">' + r.rate + '</div></div>';
        });
        h += '</div>';
      }
      // Benchmark
      const bmk = (d.benchmarks || {})[link];
      if (bmk) {
        const cols = linkMetaCfg[link] || [['CTR','%','ctr'],['CPM','元','cpm']];
        h += '<div class="m3b-bench-grid">';
        for (let ti = 0; ti < 3; ti++) {
          h += '<div class="m3b-bench-card"><div class="m3b-bench-card-stripe" style="background:' + tierColors[ti] + '"></div>';
          h += '<div class="m3b-bench-card-body"><div class="m3b-bench-card-tier" style="color:' + tierColors[ti] + '">' + tierLabels[ti] + '</div>';
          h += '<div class="m3b-bench-card-vals">';
          cols.forEach(function(col) {
            const vals = bmk[col[2]]; if (!vals) return;
            const v = ti < vals.length ? vals[ti] : '-';
            h += '<div class="m3b-bench-val-row"><span class="m3b-bench-val-label">' + col[0] + '</span><span class="m3b-bench-val-num">' + (v != null ? v : '-') + '</span></div>';
          });
          h += '</div></div></div>';
        }
        h += '</div>';
        h += '<div class="m3b-bench-card-hint">基于该赛道 ' + (bmk.n || '-') + ' 个广告主数据</div>';
      }
    });
  }

  // TOP素材
  if (d.mats && d.mats.length) {
    h += '<div class="m3b-section-label"><span>🖼️</span> TOP素材</div>';
    h += '<div class="m3b-mat-grid">';
    d.mats.forEach(function(m) {
      const nl = m.noteId && m.noteId !== 'nan' ? 'https://www.xiaohongshu.com/explore/' + m.noteId : '#';
      h += '<div class="m3b-mat-card"><a href="' + nl + '" target="_blank"><img class="m3b-mat-cover" src="' + m3bEsc(m.cover || '') + '" alt="" onerror="this.style.display=\'none\'"></a>';
      h += '<div class="m3b-mat-info"><div class="m3b-mat-title">' + m3bEsc(m.title || '') + '</div>';
      h += '<div class="m3b-mat-meta"><div>消耗 ' + (m.spend || '¥0') + '</div><div>CTR ' + (m.ctr || '0%') + '</div></div>';
      h += '<div class="m3b-mat-brand">' + m3bEsc(m.brand || '') + '</div></div></div>';
    });
    h += '</div>';
  }

  // 高消耗标题
  if (d.top_titles && d.top_titles.length) {
    h += '<div class="m3b-section-label"><span>✍️</span> 高消耗标题参考 <span class="m3b-tag">TOP消耗笔记标题</span></div>';
    h += '<div class="m3b-formula-card-list">';
    d.top_titles.forEach(function(t, i) {
      h += '<div class="m3b-formula-card"><div class="m3b-formula-num">' + String(i+1).padStart(2,'0') + '</div>';
      h += '<div class="m3b-formula-examples" style="text-align:left">' + m3bEsc(t) + '</div></div>';
    });
    h += '</div>';
  }

  area.innerHTML = h;
}
